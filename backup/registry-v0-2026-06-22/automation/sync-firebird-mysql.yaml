id: sync-firebird-mysql
category: automation
type: pipeline
name: sync_firebird_mysql
description: Sincronización CDC Firebird → MySQL — extracción de 18 tablas cada 30 minutos

status: operational

criticality:
  business: critical    # Alimenta toda la analítica
  operational: high   # Si falla, DB_RAW se queda desactualizada
  technical: medium    # Auto-repair con reconcile configurado

entrypoint:
  type: python-script
  path: /home/carlos/proyectos/sync_bridge/sync_bridge.py

schedule: "*/30 * * * *"

flow:
  source:
    - firebird-eleventa
  target:
    - mysql-db-raw

repository:
  url: git@github.com:sowerkoku/sync_bridge.git
  type: github

documentation:
  - /home/carlos/proyectos/sync_bridge/README.md
  - /home/carlos/proyectos/sync_bridge/docs/ADR-0001.md

tags: [sync, firebird, etl, cdc]

relations:
  runs_on: [server-192-168-1-52]
  depends_on: [firebird, mysql]
  part_of: [cic]