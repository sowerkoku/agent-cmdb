id: backup-mysql-job
category: automation
type: script
name: backup_mysql
description: Respaldo diario de bases de datos MySQL

status: operational

criticality:
  business: medium     # Recovery point objective depende de esto
  operational: high   # Sin backup no hay recovery
  technical: low      # Script simple, bajo riesgo

entrypoint:
  type: shell-script
  path: /home/carlos/scripts/backup_mysql.sh

schedule: "0 3 * * *"

retention_days: 30

tags: [backup, mysql, recovery]

relations:
  runs_on: [orange-pi-54]
  depends_on: [mysql]
  part_of: [cic]