# Categoría: endpoints
# Estado: ACTIVADO (2026-06-20)
#
# Propósito: Inventario de URLs y puertos de servicios accesibles por red.
# Pregunta que responde: "¿Qué servicios son accesibles por red y cómo?"
#
# PRINCIPIO ARQUITECTÓNICO: Minimalismo + service_ref
# ---------------------------------------------------
# Los endpoints NO duplican información de software/.
# Solo contienen:
#   - url: URL completa del endpoint
#   - service_ref: vínculo al software que lo provee
#   - access: internal|localhost|public
#   - auth: required|none
#   - notes: info operativa opcional
#
# El nombre, descripción, relaciones VIVEN EN software/ — no aquí.
#
# Estructura:
#   id: <endpoint-id>              # Único, puede diferir del software
#   category: endpoints
#   type: <tipo>                   # Ver tipos abajo
#   name: <nombre legible>         # Mínimo para list()
#   url: <url completa>
#   service_ref: <software-id>     # Vínculo al software
#   access: internal|localhost|public
#   auth: required|none
#   notes: <opcional>
#
# Tipos de endpoint:
#   web-ui, api, dns-server, dns-ui, agent-gateway,
#   container-ui, db-ui, bi-dashboard, llm-ui, llm-api, search-ui
#
# Acceso:
#   internal   → red local (192.168.1.x)
#   localhost  → solo máquina donde corre (127.0.0.1)
#   public     → accesible desde fuera de la red
#
# Autor: Hermes Agent
# Fecha activación: 2026-06-20
# Validación: registry_validate() OK (0 errores, 0 warnings)