id: hermes-webon
category: software
type: ai-agent
name: Hermes (webon)
description: Agente IA especializado en desarrollo web, frontend y despliegue de aplicaciones
status: operational
criticality:
  business: medium
  operational: low
  technical: medium
runtime:
  type: python-venv
  install_path: /home/carlos/.hermes/hermes-agent/venv
  activate_cmd: source /home/carlos/.hermes/hermes-agent/venv/bin/activate && hermes
    --profile webon gateway run
network:
  host: 192.168.1.52
  port: 8000
  protocol: http
  binding: 0.0.0.0
  ports:
  - 8000
config:
  profile: webon
  config_file: /home/carlos/.hermes/profiles/webon/config.yaml
tags:
- agent
- ia
- hermes
- profile
- webon
- web
- frontend
relations:
  runs_on:
  - server-192-168-1-52
  part_of:
  - cic
  depends_on:
  - ollama
location:
  ip: 192.168.1.52
