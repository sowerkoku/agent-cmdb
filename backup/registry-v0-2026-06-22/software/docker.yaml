id: docker
category: software
type: container-runtime
name: Docker
description: Motor de contenedores — gestiona imágenes y contenedores del CIC

status: operational
version: "24.0"

criticality:
  business: critical    # Todo el stack corre en containers
  operational: critical # Sin Docker, no hay servicios
  technical: high       # System service, abundante uso

runtime:
  type: system-service
  service_name: docker
  install_path: /var/lib/docker

network:
  host: localhost
  socket: /var/run/docker.sock

tags: [containers, runtime, virtualization]

relations:
  runs_on: [orange-pi-54]
  part_of: [cic]