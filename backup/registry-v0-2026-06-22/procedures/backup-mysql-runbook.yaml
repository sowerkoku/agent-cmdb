id: backup-mysql-runbook
category: procedures
type: runbook
name: Backup MySQL
description: Procedimiento para respaldar y restaurar bases de datos MySQL

criticality:
  business: high       # Recovery depende de esto
  operational: high   # DR procedure esencial
  technical: medium   # Script simple pero crítico

steps:
  - id: step-1
    action: dump
    description: Generar dump de la base
    command: |
      mysqldump -u root -p DB_CIC > /backup/mysql/db_cic_$(date +%Y%m%d).sql

  - id: step-2
    action: verify
    description: Comprimir y verificar integridad
    command: |
      gzip /backup/mysql/db_cic_$(date +%Y%m%d).sql

  - id: step-3
    action: rotate
    description: Eliminar dumps con más de 30 días
    command: |
      find /backup/mysql -name "*.sql.gz" -mtime +30 -delete

when_to_use:
  - Respaldo programado diario
  - Antes de cualquier cambio en esquema
  - Recuperación ante incidentes

rollback:
  description: Para restaurar, descomprimir y ejecutar contra MySQL
  command: |
    gunzip < /backup/mysql/db_cic_20260609.sql.gz | mysql -u root -p DB_CIC

tags: [backup, mysql, recovery]

relations:
  part_of: [cic]